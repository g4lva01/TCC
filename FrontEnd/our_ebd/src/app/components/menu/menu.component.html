<div class="sidebar" [class.aberto]="menuVisible">
  <button 
    (click)="toggleMenu()" 
    class="toggle-button" 
    [ngClass]="menuVisible ? 'botao-fechar' : 'botao-abrir'">
    {{ menuVisible ? 'X' : '☰' }}
  </button>

  <div class="menu-content">
    <div class="user-menu">
      <button class="user-icon" (click)="togglePerfilMenu()">
        👤 <!-- pode trocar por um ícone SVG ou FontAwesome -->
      </button>

      <div *ngIf="perfilMenuVisible" class="perfil-dropdown">
        <button *ngFor="let perfil of rolesUsuario" (click)="trocarPerfil(perfil)">
          {{ perfil }}
        </button>
      </div>
    </div>
    <button id="Atividades" [routerLink]="['/activitysManager']">Atividades</button>
    <button id="Relatório" [routerLink]="['/reportManager']">Frequência</button>
    <button id="Chamada" [routerLink]="['/chamada']">Chamada</button>
    <button id="Frequência" [routerLink]="['/frequencyManager']">Relatório</button>
    <button 
      id="Gerenciar" 
      [routerLink]="['/managingProfiles']" 
      *ngIf="perfilAtivo === 'GESTOR' || perfilAtivo === 'ADMIN'">
      Gerenciar Perfis
    </button>
    <button [routerLink]="['/enroll']"
      *ngIf="perfilAtivo === 'GESTOR' || perfilAtivo === 'ADMIN'">
      Matricular
    </button>
    <button (click)="sair()">Sair</button>
  </div>
</div>
