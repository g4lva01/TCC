<div class="grafico-container">
  <div class="grafico-titulo">{{ titulo }}</div>

  <canvas *ngIf="temDados; else vazio"
          baseChart
          [data]="chartData"
          [options]="chartOptions"
          [type]="chartType">
  </canvas>

  <ng-template #vazio>
    <div class="mensagem-vazia">Nenhum dado disponível</div>
  </ng-template>
</div>
