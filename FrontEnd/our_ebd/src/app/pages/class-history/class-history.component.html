<div class="layout">
    <app-menu></app-menu>
    <div class="main-content">
        <div class="header">
        <h3 id="title">EBD</h3>
        </div>
    </div>
</div>

<div class="historico-container">
  <header class="header-secao">
    <h2>📅 Histórico: {{ turma }}</h2>
    
    <div class="filtros-bar">
      <div class="campo-filtro">
        <label>Período</label>
        <select [(ngModel)]="trimestreSelecionado" (change)="carregarHistorico()">
          <option [value]="1">1º Trimestre</option>
          <option [value]="2">2º Trimestre</option>
          <option [value]="3">3º Trimestre</option>
          <option [value]="4">4º Trimestre</option>
        </select>
      </div>

      <div class="campo-filtro">
        <label>Ano</label>
        <select [(ngModel)]="anoSelecionado" (change)="carregarHistorico()">
          <option *ngFor="let ano of anosDisponiveis" [value]="ano">{{ ano }}</option>
        </select>
      </div>
    </div>
  </header>

  <div class="lista-historico">
    <div class="card-registro" *ngFor="let item of historico">
      <div class="info-principal">
        <span class="data-label">{{ item.data | date:'dd/MM/yyyy' }}</span>
        <div class="stats-row">
          <div class="stat">
            <span class="icon">👥</span>
            <span class="valor">{{ item.presentes }}</span>
            <span class="desc">Presenças</span>
          </div>
          <div class="stat">
            <span class="icon">📖</span>
            <span class="valor">{{ item.levouBiblia }}</span>
            <span class="desc">Bíblias</span>
          </div>
          <div class="stat">
            <span class="icon">📚</span>
            <span class="valor">{{ item.revistas }}</span>
            <span class="desc">Revistas</span>
          </div>
        </div>
      </div>
      
      <button class="btn-detalhes" [routerLink]="['/chamada', turma, item.data]">
        Ver Chamada
      </button>
    </div>

    <!-- Feedback caso não haja registros -->
    <div class="vazio" *ngIf="historico.length === 0">
      <p>Nenhum registro encontrado para este período.</p>
    </div>
  </div>
</div>
