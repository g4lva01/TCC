<div class="login-wrapper">
  <div class="login-card">
    <div class="container_logo">
      <h3 id="title">EBD</h3>
      <p class="subtitle">Escola Bíblica Dominical</p>
    </div>

    <form [formGroup]="formulario" (ngSubmit)="fazerLogin()" class="container_camps">
      <div class="input-group">
        <input type="text" formControlName="identificador" placeholder="Matrícula ou Nome completo" required />
      </div>
      
      <div class="input-group">
        <input type="password" formControlName="senha" placeholder="Senha" required />
      </div>

      <button type="submit" class="btn-primary" [disabled]="formulario.invalid">
        ENTRAR
      </button>

      <div class="actions">
        <button type="button" class="btn-link" [routerLink]="['/new_password']">
          Esqueci a senha
        </button>
        
        <hr class="divider">
        
        <p>Ainda não tem conta?</p>
        <button type="button" class="btn-outline" [routerLink]="['/register']">
          CADASTRAR-SE
        </button>
      </div>
    </form>
  </div>
</div>
