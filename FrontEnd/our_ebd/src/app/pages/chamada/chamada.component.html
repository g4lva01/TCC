<div class="layout">
  <app-menu></app-menu>
  <div class="main-content">
    <div class="header">
      <h3 id="title">EBD</h3>
    </div>
  </div>
</div>

<div class="chamada-container">
  <header class="header-chamada">
    <h2>Chamada</h2>
    <div class="trimestre-selector">
      <label>Trimestre</label>
      <select [(ngModel)]="trimestreSelecionado" (change)="onTrimestreChange()">
        <option *ngFor="let t of trimestres" [value]="t">{{ t }}</option>
      </select>
    </div>
  </header>

  <div class="domingos-section" *ngIf="domingosTrimestre.length > 0">
    <label class="label-section">Próximos Domingos</label>
    <div class="botoes-domingos">
      <button *ngFor="let d of domingosTrimestre"
              (click)="selecionarDomingo(d)"
              [class.selecionado]="data === d"
              [class.com-chamada]="domingosComChamada.includes(d)"
              [class.sem-chamada]="!domingosComChamada.includes(d) && isPastDate(d)"
              [class.futuro]="!isPastDate(d) && !isToday(d)">
        <span class="dia">{{ d | date:'dd' }}</span>
        <span class="mes">{{ d | date:'MMM' }}</span>
      </button>
    </div>
  </div>

  <div class="turma-header">
    <h3>Turma: <span>{{ turmaNome }}</span></h3>
    <button class="btn-qr" (click)="toggleScanner()">
      <span class="icon">📷</span> {{ mostrarScanner ? 'Fechar' : 'QR Code' }}
    </button>
  </div>

  <!-- Scanner Card -->
  <div class="scanner-card" *ngIf="renderizarScanner">
    <zxing-scanner
      [enable]="mostrarScanner"
      [device]="selectedDevice"
      [formats]="formats"
      (camerasFound)="onCamerasFound($event)"
      (scanSuccess)="onScanSuccess($event)">
    </zxing-scanner>
  </div>

  <div class="aluno-lista">
    <div *ngFor="let aluno of alunos; let i = index" class="aluno-card" [class.presente-border]="aluno.presente">
      <div class="aluno-info">
        <span class="nome">{{ aluno.nome }}</span>
      </div>
      
      <div class="aluno-actions">
        <button class="btn-check" (click)="togglePresenca(i)" [class.active]="aluno.presente">
          {{ aluno.presente ? '✅' : 'Presença' }}
        </button>
        <button class="btn-check" (click)="toggleBiblia(i)" [disabled]="!aluno.presente" [class.active]="aluno.biblia">
          {{ aluno.biblia ? '📖' : 'Bíblia' }}
        </button>
      </div>
    </div>
  </div>

  <div class="resumo-financeiro">
    <div class="campo">
      <label>Visitantes</label>
      <input type="number" [(ngModel)]="visitantes" placeholder="0" />
    </div>
    <div class="campo">
      <label>Oferta da Turma</label>
      <input currencyMask [(ngModel)]="oferta" [options]="{ prefix: 'R$ ', thousands: '.', decimal: ',' }" />
    </div>
  </div>

  <button class="btn-finalizar" (click)="finalizarChamada()">
    Finalizar Chamada
  </button>
</div>
