<div class="layout">
  <app-menu-student></app-menu-student>
  <app-menu *ngIf="temPermissao"></app-menu>
  <div class="main-content">
    <div class="header">
      <h3 id="title">EBD</h3>
    </div>
  </div>
</div>

<div class="activity-container">
  <header class="page-header">
    <h2>Atividades da Turma</h2>
    <div class="filters">
      <select [(ngModel)]="turmaSelecionada" (change)="carregarAtividades()">
        <option *ngFor="let turma of turmas" [value]="turma.id">{{ turma.nome }}</option>
      </select>

      <select (change)="onTrimestreChange($event)" [ngModel]="trimestreSelecionado">
        <option [value]="1">1º Trimestre</option>
        <option [value]="2">2º Trimestre</option>
        <option [value]="3">3º Trimestre</option>
        <option [value]="4">4º Trimestre</option>
      </select>
    </div>
    
    <button *ngIf="temPermissao" class="btn-primary" (click)="mostrarModal = true">
      + Nova Atividade
    </button>
  </header>

  <div class="activities-grid" *ngIf="trimestreSelecionado">
    <div *ngFor="let atividade of atividades" class="activity-card">
      <div class="card-header">
        <span class="lesson-badge">Lição {{ atividade.numeroLicao }}</span>
        <span class="date-tag">{{ atividade.dataPublicacao | date:'dd/MM' }}</span>
      </div>
      <h3>{{ atividade.titulo }}</h3>
      <p class="description">{{ atividade.descricao }}</p>
      
      <div class="links-section" *ngIf="atividade.links?.length">
        <a *ngFor="let link of atividade.links" [href]="link.url" target="_blank" class="link-pill">
          🔗 {{ link.descricao || 'Link' }}
        </a>
      </div>

      <div class="card-actions" *ngIf="temPermissao">
        <button class="btn-icon edit" (click)="editarAtividade(atividade)">✏️</button>
        <button class="btn-icon delete" (click)="excluirAtividade(atividade)">🗑️</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" *ngIf="mostrarModal">
    <div class="modal">
      <button class="fechar" (click)="mostrarModal = false">✖</button>
      <h3>{{ atividadeEditandoId ? 'Editar' : 'Nova' }} Atividade</h3>

      <label>Número da Lição</label>
      <input type="number" [(ngModel)]="novaAtividade.numeroLicao" placeholder="Ex: 1"/>

      <label>Data (Domingo)</label>
      <select [(ngModel)]="novaAtividade.dataPublicacao">
        <option *ngFor="let domingo of domingos" [ngValue]="domingo">
          {{ domingo | date:'dd/MM/yyyy' }}
        </option>
      </select>

      <label>Título</label>
      <input type="text" [(ngModel)]="novaAtividade.titulo" placeholder="Título da lição"/>

      <label>Descrição</label>
      <textarea [(ngModel)]="novaAtividade.descricao" rows="3"></textarea>

      <label>Links Úteis</label>
      <div *ngFor="let link of novaAtividade.links; let i = index" class="link-input-group">
        <input type="text" [(ngModel)]="link.url" placeholder="URL">
        <input type="text" [(ngModel)]="link.descricao" placeholder="Nome">
        <button class="btn-remover" (click)="removerLink(i)">🗑️</button>
      </div>
      <button class="btn-adicionar" (click)="adicionarLink()">+ Adicionar Link</button>

      <button class="btn-concluido" (click)="salvarAtividade()">SALVAR ATIVIDADE</button>
    </div>
  </div>
</div>
