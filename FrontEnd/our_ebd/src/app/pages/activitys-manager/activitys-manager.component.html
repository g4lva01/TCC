<div class="layout">
  <app-menu-student></app-menu-student>
  <app-menu *ngIf="temPermissao"></app-menu>
  <div class="main-content">
    <div class="header">
      <h3 id="title">EBD</h3>
    </div>
  </div>
</div>

<div class="container">
  <h2>Atividades da Turma</h2>

  <label>Selecione a turma:</label>
  <select [(ngModel)]="turmaSelecionada" (change)="carregarAtividades()">
      <option *ngFor="let turma of turmas" [value]="turma.id">{{ turma.nome }}</option>
  </select>

  <label>Selecione o trimestre:</label>
  <select [(ngModel)]="trimestreSelecionado" (change)="onTrimestreChange($event)">
    <option [value]="1">1º Trimestre</option>
    <option [value]="2">2º Trimestre</option>
    <option [value]="3">3º Trimestre</option>
    <option [value]="4">4º Trimestre</option>
  </select>

  <button *ngIf="temPermissao" (click)="mostrarModal = true">Nova Atividade</button>

  <div class="modal-overlay" *ngIf="mostrarModal">
    <div class="modal">
      <button class="fechar" (click)="mostrarModal = false">✖</button>
      <h3>Criar Nova Atividade</h3>

      <label>Número da Lição</label>
      <input type="number" [(ngModel)]="novaAtividade.numeroLicao" placeholder="Ex: 1"/>

      <label>Data (Domingo)</label>
      <select [(ngModel)]="novaAtividade.dataPublicacao">
        <option *ngFor="let domingo of domingos" [ngValue]="domingo">
          {{ domingo | date:'dd/MM/yyyy' }}
        </option>
      </select>

      <label>Título</label>
      <input type="text" [(ngModel)]="novaAtividade.titulo" placeholder="Ex: Estudo Bíblico sobre Romanos"/>

      <label>Descrição</label>
      <textarea [(ngModel)]="novaAtividade.descricao" placeholder="Ex: Encontro semanal para estudo e reflexão sobre o livro de Romanos"></textarea>

      <label>Links</label>
      <div *ngFor="let link of novaAtividade.links; let i = index">
        <input type="text" [(ngModel)]="link.url" placeholder="URL">
        <input type="text" [(ngModel)]="link.descricao" placeholder="Descrição">
        <button (click)="removerLink(i)">Remover</button>
      </div>
      <button (click)="adicionarLink()">+ Adicionar Link</button>

      <button class="concluido" (click)="salvarAtividade()">CONCLUÍDO</button>
    </div>
  </div>

  <div *ngFor="let atividade of atividades" class="card">
    <h2>Lição {{ atividade.numeroLicao }}</h2>
    <h3>{{ atividade.titulo }}</h3>
    <p><strong>Data (Domingo):</strong> {{ atividade.dataPublicacao | date:'dd/MM/yyyy' }}</p>
    <p><strong>Descrição:</strong> {{ atividade.descricao }}</p>
    <div *ngIf="atividade.links?.length">
      <strong>Links:</strong>
      <ul>
        <li *ngFor="let link of atividade.links">
          <a [href]="link.url" target="_blank">{{ link.descricao || link.url }}</a>
        </li>
      </ul>
    </div>

    <div *ngIf="temPermissao">
      <button class="botao-editar" (click)="editarAtividade(atividade)">Editar</button>
      <button class="botao-excluir" (click)="excluirAtividade(atividade)">Excluir</button>
    </div>
  </div>
</div>
