<div class="layout">
  <app-menu></app-menu>
  <div class="main-content">
    <div class="header">
      <h3 id="title">EBD</h3>
    </div>
    <div class="dashboard">
      <!-- Top Presenças -->
      <div class="card">
        <app-frequency-graph
          [titulo]="'Top Presenças'"
          [labels]="presencasLabels"
          [datasets]="[
            { label: 'Presenças', data: presencasData, backgroundColor: '#732991' }
          ]">
        </app-frequency-graph>
      </div>

      <!-- Top Faltas -->
      <div class="card">
        <app-frequency-graph
          [titulo]="'Top Faltas'"
          [labels]="faltasLabels"
          [datasets]="[
            { label: 'Faltas', data: faltasData, backgroundColor: '#e74c3c' }
          ]">
        </app-frequency-graph>
      </div>

      <!-- Faltas por Dia -->
      <div class="card">
        <app-frequency-graph
          [titulo]="'Faltas por Dia'"
          [labels]="faltasDiaLabels"
          [datasets]="[
            { label: 'Faltas', data: faltasDiaData, backgroundColor: '#e67e22' }
          ]">
        </app-frequency-graph>
      </div>

      <!-- Frequência por Turma -->
      <div class="card">
        <app-frequency-graph
          [titulo]="'Frequência por Turma'"
          [labels]="turmasLabels"
          [datasets]="[
            { label: 'Frequência', data: turmasData, backgroundColor: '#3498db' }
          ]">
        </app-frequency-graph>
      </div>

      <aside class="alerts-section" *ngIf="diasSemChamada.length > 0">
        <div class="alerts-header">
          <span class="icon">🔔</span>
          <h4>Pendências de Chamada</h4>
        </div>
        
        <div class="alerts-list">
          <div class="alert-item" *ngFor="let aviso of diasSemChamada">
            <div class="turma-badge">{{ aviso.nomeTurma }}</div>
            <div class="days-grid">
              <a class="day-pill" 
                *ngFor="let dia of aviso.diasSemChamada"
                [routerLink]="['/chamada', aviso.nomeTurma, (dia | date:'yyyy-MM-dd')]">
                📅 {{ dia | date:'dd/MM' }}
              </a>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>
</div>
