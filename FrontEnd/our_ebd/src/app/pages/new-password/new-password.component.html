<div class="new-password-wrapper">
  <div class="new-password-card">
    <div class="container_logo">
      <h3 id="title">EBD</h3>
      <p class="subtitle">Recuperar Senha</p>
    </div>

    <form [formGroup]="formulario" (ngSubmit)="alterarLogin()" class="container_camps">
      <div class="input-group">
        <label class="field-label">Identificação</label>
        <input type="text" placeholder="Matrícula ou Nome Completo" formControlName="nomeMat" required>
      </div>

      <div class="input-group">
        <label class="field-label">Nova Senha</label>
        <input type="password" placeholder="Digite a nova senha" formControlName="nvSenha" required>
        <small class="info-senha" [class.error]="formulario.get('nvSenha')?.errors?.['senhaFraca'] && formulario.get('nvSenha')?.touched">
          Mínimo 8 caracteres, maiúscula, número e símbolo.
        </small>
      </div>

      <div class="input-group">
        <label class="field-label">Confirmação</label>
        <input type="password" placeholder="Confirme a nova senha" formControlName="cfNvSenha" required>
        <div class="error-message" *ngIf="formulario.errors?.['senhasDiferentes'] && formulario.get('cfNvSenha')?.touched">
          ⚠️ As senhas não coincidem.
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="formulario.invalid">
        ALTERAR SENHA
      </button>

      <button type="button" class="btn-link" [routerLink]="['/']">
        Voltar para o login
      </button>
    </form>
  </div>
</div>
